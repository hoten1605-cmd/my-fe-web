<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký hệ thống - THCT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
        }

        .login-wrapper { 
            width: 100%; max-width: 440px; padding: 40px 30px;
            text-align: center;
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1);
        }

        .custom-input {
            background-color: #f8f9fa !important;
            color: #212529 !important;
            border: 1px solid #dee2e6 !important;
            padding: 12px 20px !important; 
            border-radius: 10px !important;
            transition: all 0.3s ease;
        }
        .custom-input:focus {
            background-color: #ffffff !important;
            border-color: #6ea8fe !important; 
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25) !important;
        }
        .custom-input::placeholder { color: #adb5bd !important; }

        .custom-link {
            color: #0d6efd !important; 
            transition: 0.3s;
            text-decoration: none;
        }
        .custom-link:hover {
            color: #0a58ca !important;
            text-decoration: underline !important;
        }

        .brand-logo {
            max-width: 180px; 
            height: auto;
            margin-bottom: 15px;
            mix-blend-mode: multiply; 
        }

        .form-label {
            color: #495057 !important;
            font-size: 0.95rem !important;
        }
        .form-label i { color: #0dcaf0 !important; }

        .btn-custom {
            background: linear-gradient(180deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            color: white !important; 
            border: none; 
            padding: 12px; 
            border-radius: 10px; 
            font-size: 1.1rem; 
            transition: 0.3s;
        }
        .btn-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(15, 32, 39, 0.4);
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="mb-3">
            <img src="{{ url_for('static', filename='images/logo1.png') }}" alt="THCT Parking Logo" class="brand-logo">
        </div>
        
        <h4 class="fw-bold mb-4" style="color: #1e293b; letter-spacing: 1px;">Đăng ký</h4>
        
        {% if error %}
            <div class="alert alert-danger py-2 fw-bold small border-0 shadow-sm rounded-3"><i class="fa-solid fa-triangle-exclamation"></i> {{ error }}</div>
        {% endif %}
        
        {% if success %}
            <div class="alert alert-success py-2 fw-bold small border-0 shadow-sm rounded-3"><i class="fa-solid fa-circle-check"></i> {{ success }}</div>
            <a href="/login" class="btn w-100 fw-bold mt-3 btn-custom">Về trang Đăng nhập</a>
        {% else %}
            <form method="POST" action="/register" class="text-start">
                <div class="mb-3">
                    <label class="form-label fw-bold"><i class="fa-solid fa-user-plus me-1"></i> Tài khoản</label>
                    <input type="text" name="username" class="form-control custom-input" placeholder="Nhập tên tài khoản..." required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold"><i class="fa-solid fa-lock me-1"></i> Mật khẩu</label>
                    <input type="password" name="password" class="form-control custom-input" placeholder="***" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold"><i class="fa-solid fa-shield-halved me-1"></i> Xác nhận mật khẩu</label>
                    <input type="password" name="confirm_password" class="form-control custom-input" placeholder="***" required>
                </div>
                <button type="submit" class="btn w-100 fw-bold shadow-sm mb-3 btn-custom">
                    Xác nhận đăng ký
                </button>
            </form>
            <p class="mt-3 text-secondary small">Đã có tài khoản? <a href="/login" class="fw-bold custom-link">Đăng nhập</a></p>
        {% endif %}
    </div>
</body>
</html>
